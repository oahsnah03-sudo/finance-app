<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>财管刷题系统</title>
<link rel="manifest" href="manifest.json">
<style>
body { font-family: Arial; padding: 20px; }
.card { border:1px solid #ccc; padding:15px; margin-top:15px; border-radius:10px;}
button { margin:5px; padding:8px 12px; }
</style>
</head>
<body>
<h2>📊 财管智能刷题系统</h2>
<select id="mode">
  <option value="npv">NPV/投资决策</option>
  <option value="tv">时间价值</option>
  <option value="risk">风险收益</option>
  <option value="ratio">财务分析</option>
  <option value="wacc">资本结构</option>
</select>
<button onclick="nextQ()">下一题</button>
<div class="card">
  <div id="question">点击"下一题"开始</div>
</div>
<div class="card">
  <button onclick="answer('done')">✔ 做完</button>
  <button onclick="answer('stuck')">❌ 卡住</button>
  <button onclick="answer('unsure')">🤔 不确定</button>
  <p id="feedback"></p>
</div>
<script>
const questions = {
npv: ["项目初始投资1000，每年现金流300，5年，是否投资？","两个项目A/B，NPV分别为200和150，选哪个？","折现率10%，现金流逐年增长，如何判断NPV？"],
tv: ["1000元，年利率10%，3年后终值？","每年收到500元，折现率8%，求现值？","永续年金每年1000元，折现率5%，现值？"],
risk: ["β=1.2，市场收益10%，无风险3%，求预期收益？","风险越高，收益如何变化？","组合分散风险的原理是什么？"],
ratio: ["计算ROA需要哪些数据？","流动比率过低说明什么？","杜邦分析分解ROE"],
wacc: ["债务60%，权益40%，如何计算WACC？","税率变化对WACC的影响？","为什么债务成本要乘(1-T)？"]
};
let current = "";
function nextQ(){
  let mode = document.getElementById("mode").value;
  let qs = questions[mode];
  current = qs[Math.floor(Math.random()*qs.length)];
  document.getElementById("question").innerText = current;
  document.getElementById("feedback").innerText = "";
}
function answer(type){
  let msg = "";
  if(type === "done") msg = "✔ 很好，进入下一题";
  if(type === "stuck") msg = "❌ 卡点提示：这类题通常问题在'公式选择或第一步建模'";
  if(type === "unsure") msg = "🤔 建议先确认题型 → 再找对应公式结构";
  document.getElementById("feedback").innerText = msg;
}
</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>
</body>
</html>
