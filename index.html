<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FIN</title>

<link rel="manifest" href="manifest.json">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    padding:20px 20px 90px;
}

.page{
    display:none;
}

.active{
    display:block;
}

.logo{
    font-size:42px;
    font-weight:800;
}

.subtitle{
    color:#94a3b8;
    margin-bottom:25px;
}

.card{
    background:#1e293b;
    border-radius:24px;
    padding:25px;
    margin-bottom:20px;
}

h2{
    margin-bottom:15px;
}

select,
input{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:#334155;
    color:white;
    font-size:18px;
    margin-bottom:15px;
}

button{
    width:100%;
    border:none;
    border-radius:18px;
    padding:18px;
    font-size:18px;
    font-weight:600;
    color:white;
    margin-top:12px;
}

.next{
    background:#3b82f6;
}

.done{
    background:#22c55e;
}

.stuck{
    background:#ef4444;
}

.unsure{
    background:#f59e0b;
}

.ai{
    background:#8b5cf6;
}

#question{
    font-size:24px;
    line-height:1.6;
    text-align:center;
}

#feedback,
#aiAnswer{
    margin-top:20px;
    line-height:1.7;
    font-size:18px;
}

.stats{
    display:flex;
    justify-content:space-between;
    text-align:center;
}

.stats h3{
    font-size:28px;
}

.bar{
    height:14px;
    background:#334155;
    border-radius:10px;
    margin-top:20px;
}

.fill{
    height:14px;
    width:0%;
    border-radius:10px;
    background:#3b82f6;
}

.nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#1e293b;
    display:flex;
    justify-content:space-around;
    padding:15px 0;
}

.nav button{
    background:none;
    color:white;
    font-size:15px;
    margin:0;
    padding:0;
}

.big{
    font-size:40px;
    font-weight:700;
}

</style>
</head>

<body>

<!-- 首页 -->
<div id="home" class="page active">

<div class="logo">FIN</div>
<div class="subtitle">Finance Learning System</div>

<div class="card">
<h2>🎯 今日状态</h2>

<div class="stats">

<div>
<h3 id="xp1">0</h3>
<p>XP</p>
</div>

<div>
<h3 id="level1">1</h3>
<p>等级</p>
</div>

<div>
<h3 id="wrong1">0</h3>
<p>错题</p>
</div>

</div>

<div class="bar">
<div class="fill" id="progress"></div>
</div>

</div>

<div class="card">
<h2>🔥 当前等级</h2>
<div class="big" id="rank">
Lv.1
</div>
</div>

</div>

<!-- 刷题 -->
<div id="study" class="page">

<div class="card">

<select id="mode">
<option value="npv">NPV / 投资决策</option>
<option value="tv">时间价值</option>
<option value="risk">风险收益</option>
<option value="ratio">财务分析</option>
<option value="wacc">资本结构</option>
</select>

<button class="next" onclick="nextQ()">
🎯 下一题
</button>

</div>

<div class="card">
<div id="question">
点击下一题开始学习
</div>
</div>

<div class="card">

<button class="done"
onclick="answer('done')">
✔ 我会做
</button>

<button class="stuck"
onclick="answer('stuck')">
❌ 卡住了
</button>

<button class="unsure"
onclick="answer('unsure')">
🤔 不确定
</button>

<button class="ai"
onclick="aiExplain()">
🤖 AI讲解
</button>

<p id="feedback"></p>

</div>

</div>

<!-- AI老师 -->
<div id="teacher" class="page">

<div class="card">

<h2>🤖 AI老师</h2>

<input id="ask"
placeholder="输入问题，例如：NPV是什么">

<button class="ai"
onclick="askAI()">
发送
</button>

<p id="aiAnswer"></p>

</div>

</div>

<!-- 数据 -->
<div id="data" class="page">

<div class="card">

<h2>📈 学习统计</h2>

<p>经验值：<span id="xp2">0</span></p>
<br>

<p>等级：<span id="level2">1</span></p>
<br>

<p>错题：<span id="wrong2">0</span></p>

</div>

</div>

<!-- 导航 -->
<div class="nav">

<button onclick="showPage('home')">
🏠<br>首页
</button>

<button onclick="showPage('study')">
📚<br>刷题
</button>

<button onclick="showPage('teacher')">
🤖<br>AI
</button>

<button onclick="showPage('data')">
📈<br>数据
</button>

</div>

<script>

let xp=0;
let wrong=0;

const questions={

npv:[
"项目投资1000，每年现金流300，5年，是否投资？",
"NPV分别为200和150，应选择哪个项目？",
"折现率提高会怎样影响NPV？"
],

tv:[
"1000元10%利率，3年后的终值是多少？",
"年金现值公式是什么？",
"永续年金如何计算？"
],

risk:[
"CAPM模型公式是什么？",
"β值越大说明什么？",
"风险与收益关系如何？"
],

ratio:[
"ROA如何计算？",
"流动比率过低说明什么？",
"杜邦分析包括什么？"
],

wacc:[
"WACC如何计算？",
"债务成本为什么乘(1-T)？",
"税率如何影响WACC？"
]

};

function showPage(page){

document.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"));

document.getElementById(page)
.classList.add("active");

}

function nextQ(){

let mode=document.getElementById("mode").value;

let qs=questions[mode];

let q=qs[Math.floor(Math.random()*qs.length)];

document.getElementById("question").innerText=q;

document.getElementById("feedback").innerText="";

}

function answer(type){

let msg="";

if(type==="done"){
xp+=10;
msg="🎉 做得不错！";
}

if(type==="stuck"){
xp+=2;
wrong++;
msg="💡 建议先确认公式和第一步。";
}

if(type==="unsure"){
xp+=5;
msg="📖 建议回顾知识点。";
}

update();

document.getElementById("feedback").innerText=msg;

}

function update(){

let level=Math.floor(xp/50)+1;

document.getElementById("xp1").innerText=xp;
document.getElementById("xp2").innerText=xp;

document.getElementById("wrong1").innerText=wrong;
document.getElementById("wrong2").innerText=wrong;

document.getElementById("level1").innerText=level;
document.getElementById("level2").innerText=level;

document.getElementById("rank").innerText=
"Lv."+level;

document.getElementById("progress").style.width=
(xp%50)*2+"%";

}

function aiExplain(){

let mode=document.getElementById("mode").value;

let text="";

if(mode==="npv")
text="NPV＝未来现金流现值减去初始投资。";

if(mode==="tv")
text="时间价值核心是PV、FV和复利。";

if(mode==="risk")
text="风险收益重点是CAPM模型。";

if(mode==="ratio")
text="财务分析关注盈利、偿债和运营能力。";

if(mode==="wacc")
text="WACC是企业综合资本成本。";

document.getElementById("feedback")
.innerText=text;

}

function askAI(){

let q=document
.getElementById("ask")
.value.toLowerCase();

let a="";

if(q.includes("npv"))
a="NPV=未来现金流现值－初始投资，大于0通常可以投资。";

else if(q.includes("wacc"))
a="WACC是债务成本和权益成本的加权平均。";

else if(q.includes("capm"))
a="CAPM：E(R)=Rf+β(Rm-Rf)。";

else if(q.includes("beta") || q.includes("β"))
a="β衡量系统风险，越高风险越大。";

else if(q.includes("roe"))
a="ROE反映股东权益收益率。";

else
a="知识库暂未收录该问题，以后可以继续扩展。";

document.getElementById("aiAnswer")
.innerText=a;

}

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
