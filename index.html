<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FIN</title>

<link rel="manifest" href="manifest.json">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:#ffffff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    padding:20px;
}

.container{
    max-width:600px;
    margin:auto;
}

.logo{
    font-size:40px;
    font-weight:700;
    margin-bottom:8px;
}

.subtitle{
    color:#94a3b8;
    margin-bottom:30px;
    font-size:16px;
}

.card{
    background:#1e293b;
    border-radius:24px;
    padding:25px;
    margin-bottom:20px;
}

select{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:#334155;
    color:white;
    font-size:18px;
    margin-bottom:20px;
}

.nextBtn{
    width:100%;
    border:none;
    border-radius:18px;
    padding:18px;
    font-size:20px;
    font-weight:600;
    background:#3b82f6;
    color:white;
}

#question{
    font-size:26px;
    line-height:1.6;
    text-align:center;
}

.action{
    width:100%;
    border:none;
    border-radius:18px;
    padding:18px;
    margin-top:15px;
    font-size:18px;
    font-weight:600;
    color:white;
}

.done{
    background:#22c55e;
}

.stuck{
    background:#ef4444;
}

.unsure{
    background:#f59e0b;
}

#feedback{
    margin-top:25px;
    line-height:1.7;
    font-size:20px;
    color:#cbd5e1;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#64748b;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">FIN</div>
<div class="subtitle">Finance Learning System</div>

<select id="mode">
    <option value="npv">NPV / 投资决策</option>
    <option value="tv">时间价值</option>
    <option value="risk">风险收益</option>
    <option value="ratio">财务分析</option>
    <option value="wacc">资本结构</option>
</select>

<button class="nextBtn" onclick="nextQ()">
🎯 下一题
</button>

<div class="card">
    <div id="question">
        点击“下一题”开始学习
    </div>
</div>

<div class="card">

<button class="action done"
onclick="answer('done')">
✔ 我会做
</button>

<button class="action stuck"
onclick="answer('stuck')">
❌ 卡住了
</button>

<button class="action unsure"
onclick="answer('unsure')">
🤔 不确定
</button>

<p id="feedback"></p>

</div>

<div class="footer">
FIN v1.0
</div>

</div>

<script>

const questions = {

npv:[
"项目初始投资1000，每年现金流300，5年，是否投资？",
"两个项目A/B，NPV分别为200和150，选哪个？",
"折现率10%，现金流逐年增长，如何判断NPV？"
],

tv:[
"1000元，年利率10%，3年后终值？",
"每年收到500元，折现率8%，求现值？",
"永续年金每年1000元，折现率5%，现值？"
],

risk:[
"β=1.2，市场收益10%，无风险3%，求预期收益？",
"风险越高，收益如何变化？",
"组合分散风险的原理是什么？"
],

ratio:[
"计算ROA需要哪些数据？",
"流动比率过低说明什么？",
"杜邦分析如何分解ROE？"
],

wacc:[
"债务60%，权益40%，如何计算WACC？",
"税率变化对WACC有什么影响？",
"为什么债务成本乘(1-T)？"
]

};

let current="";

function nextQ(){

    let mode=document.getElementById("mode").value;

    let qs=questions[mode];

    current=qs[Math.floor(Math.random()*qs.length)];

    document.getElementById("question").innerText=current;

    document.getElementById("feedback").innerText="";
}

function answer(type){

    let msg="";

    if(type==="done")
        msg="🎉 很好，继续保持！";

    if(type==="stuck")
        msg="💡 提示：先确定题型，再找对应公式。";

    if(type==="unsure")
        msg="📖 建议重新梳理概念，再回到题目。";

    document.getElementById("feedback").innerText=msg;
}

if("serviceWorker" in navigator){
    navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
